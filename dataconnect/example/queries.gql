# 1. Query to get all public trips
query GetAllPublicTrips @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it only retrieves public trip information.") {
  trips(where: { isPublic: { eq: true } }) {
    id
    name
    description
    startDate
    endDate
    coverImageUrl
    creator {
      displayName
    }
  }
}

# 2. Query to get a user's private trips (requires authentication)
query GetMyTrips @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users as it retrieves trips created by the authenticated user.") {
  trips(where: { creatorId: { eq_expr: "auth.uid" } }) {
    id
    name
    description
    startDate
    endDate
    isPublic
    coverImageUrl
  }
}

# 3. Mutation to create a new trip (requires authentication)
mutation CreateNewTrip($name: String!, $startDate: Date!, $endDate: Date!, $isPublic: Boolean!, $description: String, $coverImageUrl: String) @auth(level: USER) {
  trip_insert(
    data: {
      name: $name
      startDate: $startDate
      endDate: $endDate
      isPublic: $isPublic
      description: $description
      coverImageUrl: $coverImageUrl
      creatorId_expr: "auth.uid"
      createdAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  ) {
    id
  }
}

# 4. Query to get activities for a specific trip
query GetTripActivities($tripId: UUID!) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users as it retrieves activities for a specific trip, which can be public or private based on other queries.") {
  activities(where: { destination: { trip: { id: { eq: $tripId } } } }) {
    id
    name
    type
    startTime
    endTime
    cost
    address
    description
    destination {
      name
      country
    }
  }
}